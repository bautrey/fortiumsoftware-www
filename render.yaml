services:
  - type: web
    name: fortiumsoftware-www
    runtime: static
    buildCommand: npm install && npm run build:css
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /css/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /images/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /engage
        destination: /engage/index.html
      - type: rewrite
        source: /execute
        destination: /execute/index.html
